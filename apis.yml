name: Meetup
description: 'Meetup is a community event platform that connects people with shared
  interests through in-person and online group meetings. Its GraphQL API enables developers
  to access group events, members, RSVPs, venue information, and community activity
  data. The API is available as part of the Meetup Pro subscription and supports event
  creation, publishing workflows, RSVP management, photo uploads, and network-wide
  group and event search for Pro organizers.

  '
