apis:
- name: Meetup GraphQL API
  description: 'A single-endpoint GraphQL API for accessing and managing Meetup community
    data including groups, events, members, tickets (RSVPs), venues, and photos. Supports
    querying, mutations for event creation and publishing, image uploads, and full
    schema introspection. Rate-limited to 500 query points per 60-second window.

    '
